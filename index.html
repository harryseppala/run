td:nth-child(4), th:nth-child(4) {

th {

<script>
function showTab(index) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', i===index);
  });
  document.querySelectorAll('.content').forEach((c,i)=>{
    c.classList.toggle('active', i===index);
  });
}

const startDate = new Date("2026-03-25");

function getCurrentWeek() {
  const now = new Date();
  const diff = Math.floor((now - startDate) / (1000*60*60*24*7));
  return diff + 1;
}

const currentWeek = getCurrentWeek();

function getISOWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function weekLabel(i) {
  // Get the Monday of the week containing startDate + i*7
  const d = new Date(startDate);
  d.setDate(d.getDate() + i * 7);
  const dow = d.getDay();
  const toMonday = (dow === 0) ? -6 : 1 - dow;
  d.setDate(d.getDate() + toMonday);
  const weekEnd = new Date(d);
  weekEnd.setDate(weekEnd.getDate() + 6);
  const wn = getISOWeekNumber(d);
  const range = `${MONTHS[d.getMonth()]} ${d.getDate()} \u2013 ${MONTHS[weekEnd.getMonth()]} ${weekEnd.getDate()}`;
  return `Week ${wn} <span class="week-dates">${range}</span>`;
}

// -------- RENDER --------
function render(plan, containerId) {
  const container = document.getElementById(containerId);

  plan.forEach((week, i) => {
    const isCurrent = (i+1 === currentWeek);

    const div = document.createElement("div");
    div.className = "week" + (isCurrent ? " current-week" : "");

    let html = `<h3>${weekLabel(i)}</h3>
    <table>
    <tr><th>Day</th><th>Workout</th><th>Dist</th><th>Details</th></tr>`;

    week[1].forEach(row=>{
      html += `<tr>
      <td>${row[0]}</td>
      <td>${row[1]}</td>
      <td>${row[2]}</td>
      <td>${row[3]}</td>
      </tr>`;
    });

    html += "</table>";
    div.innerHTML = html;
    container.appendChild(div);
  });
}
